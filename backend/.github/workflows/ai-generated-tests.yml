# Auto-generated CI/CD workflow for java spring-boot
# Generated by AI Dev Team

name: AI-Generated Tests CI
on:
  push:
    branches:
      - main
      - master
      - feature/**
  pull_request:
    branches:
      - main
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup java
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
      - name: Install dependencies
        run: mvn dependency:resolve || ./mvnw dependency:resolve
      - name: Build
        run: mvn clean package -DskipTests
      - name: Run tests
        run: mvn test
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          fail_ci_if_error: false

